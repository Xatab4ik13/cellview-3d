name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/kladovka78/server

            # Pull latest changes
            git pull origin main

            # Install all dependencies (including devDependencies for build)
            npm install

            # Build TypeScript
            npm run build

            # Run migrations
            npm run migrate || true

            # Restart with PM2 (preserve NODE_EXTRA_CA_CERTS)
            pm2 delete kladovka78-api || true
            NODE_EXTRA_CA_CERTS=/etc/ssl/certs/ca-certificates.crt pm2 start ecosystem.config.js --only kladovka78-api --update-env
            pm2 save

            echo "✅ Backend deployed successfully"
